spring:
  application:
    name: AiLock

  docker:
    compose:
      enabled: false

  ai:
    ollama:
      base-url: http://localhost:20251

      chat:
        model: gemma3:12b

      embedding:
        options:
          model: bge-m3

  datasource:
    url: jdbc:postgresql://localhost:15432/remind
    username: postgres
    password: "0514"
    driver-class-name: org.postgresql.Driver

  data:
